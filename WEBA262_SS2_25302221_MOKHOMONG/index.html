<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memory Cards Launcher</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="page-header">
      <h1>Memory Card Game</h1>
      <p>Configure the game, then open the game window.</p>
    </header>

    <main class="container">
      <section class="card">
        <h2>Game Setup</h2>

        <form id="setupForm">
          <!-- Player Name -->
          <div class="form-row">
            <label for="playerName">Player Name</label>
            <input
              type="text"
              id="playerName"
              maxlength="20"
              placeholder="Enter player name"
            />
          </div>

          <!-- Board Size -->
          <div class="form-row">
            <label for="boardSize">Board Size</label>
            <select id="boardSize">
              <option value="4x4" selected>4 x 4</option>
              <option value="4x5">4 x 5</option>
              <option value="6x6">6 x 6</option>
            </select>
          </div>

          <!-- Difficulty -->
          <div class="form-row">
            <label for="difficulty">Difficulty</label>
            <select id="difficulty">
              <option value="easy">Easy</option>
              <option value="medium" selected>Medium</option>
              <option value="hard">Hard</option>
            </select>
          </div>

          <!-- Theme -->
          <fieldset>
            <legend>Card Theme</legend>

            <label class="option-line">
              <input type="radio" name="theme" value="numbers" checked />
              Numbers
            </label>

            <label class="option-line">
              <input type="radio" name="theme" value="letters" />
              Letters
            </label>

            <label class="option-line">
              <input type="radio" name="theme" value="symbols" />
              Symbols
            </label>
          </fieldset>

          <!-- Options -->
          <fieldset>
            <legend>Game Options</legend>

            <label class="option-line">
              <input type="checkbox" id="showTimer" checked />
              Show Timer
            </label>

            <label class="option-line">
              <input type="checkbox" id="enableHints" />
              Enable Hints
            </label>

            <label class="option-line">
              <input type="checkbox" id="shuffleAnimation" checked />
              Shuffle Animation
            </label>
          </fieldset>

          <!-- Buttons -->
          <div class="button-row">
            <button type="button" id="openGameBtn">Open Game Window</button>
            <button type="button" id="saveSettingsBtn">Save Settings</button>
            <button type="button" id="loadSettingsBtn">Load Settings</button>
            <button type="button" id="resetSettingsBtn">Reset Settings</button>
            <button
              type="button"
              onclick="window.location.href = 'instructions.html'"
            >
              Instructions
            </button>
          </div>
        </form>

        <!-- Preview -->
        <div class="preview-box">
          <h3>Live Preview</h3>
          <p id="previewText">No settings selected yet.</p>
        </div>
      </section>
    </main>

    <footer class="page-footer">
      <p>Memory Card Game Launcher</p>
    </footer>

    <script src="launcher.js"></script>
  </body>
</html>
